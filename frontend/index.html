<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Music Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1>🎼 AI Music Generator</h1>
        <p>Transform your music into instrument styles</p>
      </header>

      <!-- Upload Section -->
      <section class="card">
        <h2>📤 Upload File</h2>
        <input type="file" id="fileInput" />
        <p id="uploadMsg">No file selected</p>
      </section>

      <!-- Instrument Selection -->
      <section class="card">
        <h2>🎛️ Select Instrument</h2>
        <select id="instrument">
          <option value="">Choose instrument</option>
          <option value="piano">Piano 🎹</option>
          <option value="guitar">Guitar 🎸</option>
          <option value="violin">Violin 🎻</option>
          <option value="flute">Flute 🎶</option>
          <option value="guzheng">Guzheng 🌿</option>
        </select>
      </section>

      <!-- Generate Button -->
      <section class="card">
        <button id="generateBtn">Generate 🎧</button>
        <!-- Progress -->
        <div class="progress-section">
          <h2 id="progressTitle">⏳ Processing</h2>
          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>
          <p id="statusText">Waiting...</p>
        </div>
      </section>

      <!-- Output -->
      <section class="card">
        <h2>🎧 Output</h2>

        <audio id="audioPlayer"></audio>

        <div class="controls-bar">
          <!-- Play/Pause -->
          <button id="playBtn">▶</button>

          <!-- Volume section -->
          <div class="volume-group">
            <span class="vol-icon">🔊</span>

            <input
              type="range"
              id="volumeControl"
              min="0"
              max="1"
              step="0.01"
              value="1"
            />
          </div>

          <!-- Download -->
          <button id="downloadBtn">⬇</button>
        </div>

        <div class="reset-share">
          <button id="resetBtn">🔄 Reset</button>
          <button id="shareBtn">🔗 Share</button>
        </div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
